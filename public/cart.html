<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Foodie Hub - Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="displayCart(); showUser()">

    <header class="topbar simple-topbar">
        <div class="logo-area">
            <div class="logo-box">FH</div>
            <h1>Foodie Hub</h1>
        </div>
    </header>

    <section class="page-heading">
        <h2>Your Shopping Cart</h2>
        <p>Items you selected</p>
    </section>

    <section class="cart-box">
        <ul id="cart-list"></ul>
        <h3 id="total-price">Total Price: ₹0</h3>

        <div class="cart-buttons">
            <button onclick="clearCart()">Clear Cart</button>
            <button onclick="goToOrder()">Proceed to Buy</button>
        </div>
    </section>

    <div class="bottom-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="order.html">Order</a>
        <a href="contact.html">Contact</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
